<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ticket 0003</title>

    <style>
        body {
            margin: 0;
            font-family: "gg sans", "Segoe UI", Arial, sans-serif;
            background: url("https://media.discordapp.net/attachments/1482140018855383173/1484282907588690041/banner-criadores-genesis.png?ex=69befb2d&is=69bda9ad&hm=3a5432cc089c7233284ec5bbaa2bfd20fabb44863c62157f0841f550cb0f51d3&=&format=webp&quality=lossless&width=1768&height=720") no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            pointer-events: none;
            z-index: -1;
        }
        @keyframes neonBorder {
            0%   { box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff; }
            25%  { box-shadow: 0 0 15px #5865F2, 0 0 30px #5865F2; }
            50%  { box-shadow: 0 0 15px #ff00c8, 0 0 30px #ff00c8; }
            75%  { box-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88; }
            100% { box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff; }
        }
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px 25px;
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: neonBorder 6s linear infinite;
        }
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 25px 0; }
        .message { display: flex; gap: 15px; margin-bottom: 22px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: center; gap: 8px; }
        .username { font-weight: 600; font-size: 15px; color: white; }
        .time { font-size: 12px; color: #aab0b6; }
        .text { color: #e3e5e8; font-size: 15px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
        .mention { display: inline; background: rgba(88,101,242,0.3); color: #c9cdfb; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention:hover { background: rgba(88,101,242,0.6); color: #fff; }
        .mention-role { display: inline; background: rgba(255,183,77,0.2); color: #ffb74d; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention-role:hover { background: rgba(255,183,77,0.4); }
        .mention-channel { display: inline; background: rgba(88,101,242,0.2); color: #8ea1e1; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention-channel:hover { background: rgba(88,101,242,0.4); color: #c9cdfb; }
        .emoji-unicode { font-family: "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif; font-size: 1.2em; vertical-align: middle; line-height: 1; }
        .emoji-custom { width: 22px; height: 22px; vertical-align: middle; object-fit: contain; }
        .emoji-custom.big { width: 48px; height: 48px; }
        .attachments { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .attachment-image { max-width: 400px; max-height: 300px; border-radius: 8px; cursor: pointer; object-fit: cover; box-shadow: 0 2px 12px rgba(0,0,0,0.5); transition: opacity 0.2s; }
        .attachment-image:hover { opacity: 0.85; }
        .attachment-video { max-width: 400px; border-radius: 8px; display: block; }
        .attachment-file { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 14px; color: #00c3ff; text-decoration: none; font-size: 14px; }
        .attachment-file:hover { background: rgba(255,255,255,0.12); }
        .attachment-file-icon { font-size: 20px; }
        .sticker { width: 96px; height: 96px; margin-top: 6px; object-fit: contain; border-radius: 4px; }
        .embed { margin-top: 8px; border-left: 4px solid #5865F2; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; max-width: 500px; }
        .embed-title { font-weight: bold; color: white; margin-bottom: 4px; }
        .embed-description { color: #dbdee1; font-size: 14px; }
        .embed-field { margin-top: 6px; }
        .embed-field-name { font-weight: bold; font-size: 13px; color: white; }
        .embed-field-value { font-size: 13px; color: #dbdee1; }
        .embed-footer { font-size: 12px; color: #aab0b6; margin-top: 6px; }
        .embed-image { max-width: 100%; border-radius: 6px; margin-top: 8px; }
        .reply { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aab0b6; margin-bottom: 4px; }
        .reply::before { content: "↱"; font-size: 16px; color: #5865F2; }
        .reply-username { color: white; font-weight: 600; }
        a { color: #00c3ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    </style>
</head>

<body>
    <div id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" alt="">
    </div>
    <div class="container">
        
        <div class="message">
            <img class="avatar" src="https://cdn.discordapp.com/avatars/1481850733178523739/c738f6bcfcaf217e54d6ffddfeb8ea14.png?size=1024" alt="GENISIS INFLUNCER#7635">
            <div class="message-content">
                
                <div class="message-header">
                    <span class="username">GENISIS INFLUNCER#7635</span>
                    <span class="time">23/03/2026 20:24</span>
                </div>
                <div class="text"><span class="mention">@[LDRS] Cajuzinha ×͜×</span></div>
                
                
                <div class="embed" style="border-left-color:#6d2cff;"><div class="embed-title">**Ticket de Suporte**</div><div class="embed-description">Precisa de ajuda com o servidor? Nossa equipe está pronta<br>para resolver problemas técnicos, esclarecer dúvidas sobre<br>regras, auxiliar com comandos e funcionalidades. Atendimento<br>rápido e eficiente!</div></div>
            </div>
        </div>
        <div class="divider"></div>
    </div>
    <script>
        document.querySelectorAll('.attachment-image').forEach(img => {
            img.addEventListener('click', () => {
                document.getElementById('lightbox-img').src = img.src;
                document.getElementById('lightbox').classList.add('active');
            });
        });
    </script>
</body>
</html>
