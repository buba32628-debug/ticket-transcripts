<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ticket 0008</title>
    <style>
        body {
            margin: 0;
            font-family: "gg sans", "Segoe UI", Arial, sans-serif;
            background: url("https://media.discordapp.net/attachments/1482140018855383173/1484282907588690041/banner-criadores-genesis.png?ex=69ce246d&is=69ccd2ed&hm=e2d3fb9a57c9fd40cba165cdcc7a29c06f6fe71a6afc81c7bcb1ffb7d18adae1&=&format=webp&quality=lossless&width=1768&height=720") no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.00);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 60px auto;
            padding: 40px 25px;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: neonBorder 6s linear infinite;
        }
        @keyframes neonBorder {
            0%   { box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff; }
            25%  { box-shadow: 0 0 15px #5865F2, 0 0 30px #5865F2; }
            50%  { box-shadow: 0 0 15px #ff00c8, 0 0 30px #ff00c8; }
            75%  { box-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88; }
            100% { box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff; }
        }
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 25px 0; }
        .message { display: flex; gap: 15px; margin-bottom: 22px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .message-content { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: center; gap: 8px; }
        .username { font-weight: 600; font-size: 15px; color: white; }
        .time { font-size: 12px; color: #aab0b6; }
        .text { color: #e3e5e8; font-size: 15px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
        .mention { display: inline; background: rgba(88,101,242,0.3); color: #c9cdfb; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention:hover { background: rgba(88,101,242,0.6); color: #fff; }
        .mention-role { display: inline; background: rgba(255,183,77,0.2); color: #ffb74d; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention-role:hover { background: rgba(255,183,77,0.4); }
        .mention-channel { display: inline; background: rgba(88,101,242,0.2); color: #8ea1e1; font-weight: 500; border-radius: 4px; padding: 0 4px; cursor: default; transition: background 0.15s; }
        .mention-channel:hover { background: rgba(88,101,242,0.4); color: #c9cdfb; }
        .emoji-custom { width: 22px; height: 22px; vertical-align: middle; object-fit: contain; }
        .emoji-custom.big { width: 48px; height: 48px; }
        .attachments { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .attachment-image, .attachment-gif { max-width: 400px; max-height: 300px; border-radius: 8px; cursor: zoom-in; object-fit: cover; box-shadow: 0 2px 12px rgba(0,0,0,0.5); transition: opacity 0.2s; display: block; }
        .attachment-image:hover, .attachment-gif:hover { opacity: 0.85; }
        .attachment-video { max-width: 400px; border-radius: 8px; display: block; }
        .attachment-file { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 14px; color: #00c3ff; text-decoration: none; font-size: 14px; }
        .attachment-file:hover { background: rgba(255,255,255,0.12); }
        .attachment-file-icon { font-size: 20px; }
        .sticker { width: 96px; height: 96px; margin-top: 6px; object-fit: contain; border-radius: 4px; }
        /* ── Embed ── */
        .embed { margin-top: 8px; display: flex; flex-direction: column; background: #2b2d31; border-radius: 4px; border-left: 4px solid #5865F2; max-width: 520px; overflow: hidden; }
        .embed-body { display: flex; gap: 12px; padding: 12px 16px 0 12px; }
        .embed-left { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
        .embed-provider { font-size: 12px; color: #dbdee1; }
        .embed-author { display: flex; align-items: center; gap: 6px; }
        .embed-author-icon { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .embed-author-name { font-size: 14px; font-weight: 600; color: #fff; }
        .embed-author-name a { color: #fff; }
        .embed-author-name a:hover { text-decoration: underline; }
        .embed-title { font-size: 15px; font-weight: 700; color: #fff; }
        .embed-title a { color: #00a8fc; }
        .embed-title a:hover { text-decoration: underline; }
        .embed-description { font-size: 14px; color: #dbdee1; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
        .embed-fields { display: flex; flex-wrap: wrap; gap: 8px 12px; }
        .embed-field { min-width: 0; width: 100%; }
        .embed-field.inline { flex: 1 1 140px; max-width: 200px; width: auto; }
        .embed-field-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .embed-field-value { font-size: 13px; color: #dbdee1; white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
        .embed-thumbnail { width: 80px; height: 80px; border-radius: 4px; object-fit: cover; flex-shrink: 0; cursor: zoom-in; align-self: flex-start; transition: opacity 0.2s; }
        .embed-thumbnail:hover { opacity: 0.85; }
        .embed-image-wrap { margin: 10px 12px 0 12px; }
        .embed-image { width: 100%; max-height: 300px; object-fit: contain; border-radius: 4px; display: block; cursor: zoom-in; transition: opacity 0.2s; }
        .embed-image:hover { opacity: 0.85; }
        .embed-footer { display: flex; align-items: center; gap: 6px; padding: 8px 12px 10px 12px; }
        .embed-footer-icon { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .embed-footer-text { font-size: 12px; color: #aab0b6; }
        .embed-footer-sep { color: #aab0b6; font-size: 12px; margin: 0 3px; }
        /* ── Reply ── */
        .reply { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aab0b6; margin-bottom: 4px; }
        .reply::before { content: "↱"; font-size: 16px; color: #5865F2; }
        .reply-username { color: white; font-weight: 600; }
        a { color: #00c3ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        /* ── Lightbox ── */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 9999; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 60px rgba(0,0,0,0.9); object-fit: contain; }
        #lightbox-close { position: fixed; top: 16px; right: 22px; font-size: 30px; color: rgba(255,255,255,0.7); cursor: pointer; user-select: none; line-height: 1; z-index: 10000; }
        #lightbox-close:hover { color: #fff; }
    </style>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
        }

        lightbox.addEventListener('click', e => {
            if (e.target === lightbox || e.target === lightboxImg)
                lightbox.classList.remove('active');
        });
        document.getElementById('lightbox-close')
            .addEventListener('click', () => lightbox.classList.remove('active'));
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('active');
        });
